name: Sync to Gitee

on:
  push:
    branches:
      - main # 如果你的主分支是 main，请改为 main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须获取完整历史才能推送

      - name: Push to Gitee
        env:
          # 使用你已经在 Secrets 里配置好的变量
          GITEE_USER: "suesxuzhiwei"
          GITEE_TOKEN: ${{ secrets.GITEE_PASSWORD }}
        run: |
          # 1. 配置远程仓库地址 (带上 Token 认证)
          # 注意：这里使用了 HTTPS 动态拼接鉴权信息
          REMOTE_URL="https://${GITEE_USER}:${GITEE_TOKEN}@gitee.com/${GITEE_USER}/toolbox-homepage.git"

          # 2. 推送当前分支到 Gitee
          # 强制推送以确保两边完全同步
          git push -f $REMOTE_URL main:main
